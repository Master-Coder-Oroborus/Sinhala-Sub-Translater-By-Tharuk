<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium AI Subtitle Translator</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Noto+Sans+Sinhala:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Premium Obsidian & Gold/Neon Theme */
        :root {
            --bg-dark: #0a0a0c;
            --bg-panel: #121217;
            --glass-bg: rgba(18, 18, 23, 0.85);
            --glass-border: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-muted: #8b8d98;
            --accent-gold: #fbbf24;
            --accent-gold-glow: rgba(251, 191, 36, 0.4);
            --accent-purple: #8b5cf6;
            --accent-purple-glow: rgba(139, 92, 246, 0.3);
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --input-bg: rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: 'Poppins', 'Noto Sans Sinhala', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Full screen lock */
        }

        /* Animated Background Orbs */
        .bg-orbs {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 400px; height: 400px;
            background: var(--accent-purple-glow);
            top: -100px; left: -100px;
        }

        .orb-2 {
            width: 500px; height: 500px;
            background: rgba(14, 165, 233, 0.15);
            bottom: -200px; right: 20%;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 300px; height: 300px;
            background: var(--accent-gold-glow);
            top: 30%; right: -50px;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* Layout */
        .left-panel {
            width: 450px;
            min-width: 450px;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-right: 1px solid var(--glass-border);
            height: 100vh;
            padding: 40px;
            box-sizing: border-box;
            overflow-y: auto;
            z-index: 10;
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            animation: slideInLeft 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .right-panel {
            flex-grow: 1;
            height: 100vh;
            padding: 40px;
            box-sizing: border-box;
            z-index: 10;
            display: flex;
            flex-direction: column;
            animation: fadeIn 1s ease-in;
        }

        @media (max-width: 992px) {
            body { flex-direction: column; overflow: auto; height: auto; }
            .left-panel { width: 100%; min-width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--glass-border); }
            .right-panel { height: 80vh; }
        }

        /* Animations */
        @keyframes slideInLeft {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Logo & Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .premium-logo {
            width: 70px;
            height: 70px;
            margin: 0 auto 15px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.2), rgba(139, 92, 246, 0.2));
            border-radius: 20px;
            border: 1px solid rgba(251, 191, 36, 0.4);
            box-shadow: 0 0 25px var(--accent-gold-glow), inset 0 0 15px var(--accent-purple-glow);
            animation: pulseLogo 3s infinite alternate;
        }

        @keyframes pulseLogo {
            0% { box-shadow: 0 0 15px var(--accent-gold-glow), inset 0 0 10px var(--accent-purple-glow); }
            100% { box-shadow: 0 0 30px var(--accent-gold-glow), inset 0 0 20px var(--accent-purple-glow); transform: scale(1.02); }
        }

        h2 {
            margin: 0;
            font-weight: 700;
            font-size: 26px;
            letter-spacing: 1px;
            background: linear-gradient(to right, #fff, var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .creator-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-top: 10px;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .creator-badge:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        /* Inputs & Forms */
        .form-group {
            margin-bottom: 25px;
            animation: fadeInUp 0.5s ease backwards;
        }
        
        .form-group:nth-child(2) { animation-delay: 0.1s; }
        .form-group:nth-child(3) { animation-delay: 0.2s; }
        .form-group:nth-child(4) { animation-delay: 0.3s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #a1a1aa;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: var(--accent-gold);
            font-size: 16px;
        }

        input[type="file"], input[type="password"], select {
            width: 100%;
            padding: 14px 14px 14px 45px;
            background-color: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="file"] { padding: 10px 14px 10px 45px; }

        input[type="file"]::file-selector-button {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 15px;
            transition: all 0.3s;
            font-weight: 500;
        }

        input[type="file"]::file-selector-button:hover {
            background: var(--accent-gold);
            color: #000;
            box-shadow: 0 0 15px var(--accent-gold-glow);
            border-color: var(--accent-gold);
        }

        input:focus, select:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.15);
            background-color: rgba(0, 0, 0, 0.6);
        }

        .api-help-box {
            background: rgba(139, 92, 246, 0.05);
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 12px;
            color: #a78bfa;
            line-height: 1.6;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .api-help-box a { color: #ddd6fe; font-weight: 600; text-decoration: none; transition: 0.3s; }
        .api-help-box a:hover { color: #fff; text-shadow: 0 0 8px rgba(221, 214, 254, 0.8); }

        /* Buttons */
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent-gold), #d97706);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(217, 119, 6, 0.2);
            position: relative;
            overflow: hidden;
            margin-top: 10px;
        }

        button::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        button:hover:not(:disabled)::before { left: 100%; }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(251, 191, 36, 0.3);
            background: linear-gradient(135deg, #fcd34d, #d97706);
        }

        button:disabled {
            background: #27272a;
            color: #52525b;
            box-shadow: none;
            cursor: not-allowed;
        }

        #downloadBtn {
            background: linear-gradient(135deg, var(--success-color), #059669);
            color: #fff;
            display: none;
        }
        #downloadBtn:hover:not(:disabled) {
            box-shadow: 0 15px 25px rgba(16, 185, 129, 0.3);
            background: linear-gradient(135deg, #34d399, #059669);
        }

        /* Progress Area */
        .processing-area { display: none; margin-top: 25px; }

        .progress-bar-bg {
            width: 100%; background-color: rgba(0, 0, 0, 0.5);
            border-radius: 8px; height: 8px; overflow: hidden;
        }

        .progress-fill {
            height: 100%; background: linear-gradient(90deg, var(--accent-purple), var(--accent-gold));
            width: 0%; transition: width 0.4s ease;
            box-shadow: 0 0 10px var(--accent-gold-glow);
        }

        .status-text {
            text-align: center; font-size: 13px; margin-top: 12px; color: var(--text-muted); min-height: 20px;
        }

        /* Right Side: Live Preview */
        .preview-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--glass-border);
        }

        .preview-header h3 {
            margin: 0; font-size: 18px; font-weight: 500; color: #fff;
            display: flex; align-items: center; gap: 10px;
        }

        .live-preview-box {
            flex-grow: 1; overflow-y: auto; border-radius: 12px;
            padding-right: 15px; font-size: 14px; line-height: 1.6;
            scroll-behavior: smooth;
        }

        .live-preview-box::-webkit-scrollbar { width: 6px; }
        .live-preview-box::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); border-radius: 10px; }
        .live-preview-box::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .live-preview-box::-webkit-scrollbar-thumb:hover { background: var(--accent-gold); }
        
        .preview-block {
            background-color: rgba(255, 255, 255, 0.02);
            margin-bottom: 15px; padding: 20px; border-radius: 12px;
            border-left: 3px solid #3f3f46;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideUpFade 0.5s ease-out forwards;
            opacity: 0; transform: translateY(20px);
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }
        
        .preview-block.translated {
            background: linear-gradient(90deg, rgba(139, 92, 246, 0.08), rgba(0,0,0,0));
            border-left-color: var(--accent-purple);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .preview-time {
            color: var(--text-muted); font-size: 12px; margin-bottom: 12px;
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: space-between; align-items: center;
        }
        
        .status-badge {
            font-size: 10px; padding: 3px 8px; border-radius: 8px;
            background-color: rgba(255,255,255,0.05); color: #71717a; text-transform: uppercase; letter-spacing: 1px;
        }

        .status-badge.done {
            background-color: rgba(139, 92, 246, 0.15); color: #c4b5fd;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .preview-text { color: #d4d4d8; font-size: 15px; }
        .preview-text.si-text {
            color: #fde68a; font-weight: 500; font-size: 16px;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.1);
        }
        
        /* Empty State */
        .empty-state {
            height: 100%; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: #52525b;
            text-align: center; animation: pulseGlow 3s infinite alternate;
        }
        
        @keyframes pulseGlow {
            from { opacity: 0.6; filter: drop-shadow(0 0 0px transparent); }
            to { opacity: 1; filter: drop-shadow(0 0 15px rgba(255,255,255,0.05)); }
        }
    </style>
</head>
<body>

    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="left-panel">
        <div class="header">
            <div class="premium-logo">
                <svg width="34" height="34" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
