<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Subtitle Translator By Tharuk</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Noto+Sans+Sinhala:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Modern Dark Theme - No borders */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #0ea5e9;
            --accent-hover: #0284c7;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --input-bg: #0f172a;
            --help-bg: #0c4a6e;
        }

        body {
            font-family: 'Poppins', 'Noto Sans Sinhala', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            max-width: 700px;
            width: 100%;
            border: none;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-icon {
            font-size: 48px;
            color: var(--accent-color);
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(14, 165, 233, 0.3));
        }

        h2 {
            margin: 0;
            font-weight: 600;
            font-size: 26px;
            letter-spacing: 0.5px;
        }

        .creator-badge {
            display: inline-block;
            background-color: rgba(14, 165, 233, 0.15);
            color: var(--accent-color);
            padding: 4px 15px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 8px;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin: 0;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            color: var(--text-muted);
            font-size: 18px;
        }

        input[type="file"], input[type="password"], select {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background-color: var(--input-bg);
            color: var(--text-main);
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: box-shadow 0.3s ease;
        }

        input[type="file"] {
            padding: 12px 15px 12px 45px;
        }

        input[type="file"]::file-selector-button {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 15px;
            transition: background 0.3s;
        }

        input[type="file"]::file-selector-button:hover {
            background-color: var(--accent-color);
        }

        input:focus, select:focus {
            box-shadow: 0 0 0 2px var(--accent-color);
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #475569;
            cursor: not-allowed;
            transform: none;
        }

        #downloadBtn {
            background-color: var(--success-color);
            display: none;
            margin-top: 20px;
        }

        #downloadBtn:hover {
            background-color: #059669;
        }

        /* Progress Bar & Live Preview Area */
        .processing-area {
            display: none;
            margin-top: 30px;
        }

        .progress-bar-bg {
            width: 100%;
            background-color: var(--input-bg);
            border-radius: 8px;
            height: 12px;
            overflow: hidden;
            border: none;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--accent-color);
            width: 0%;
            transition: width 0.4s ease;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(14, 165, 233, 0.5);
        }

        .status-text {
            text-align: center;
            font-size: 14px;
            margin-top: 15px;
            color: var(--text-muted);
            min-height: 20px;
        }

        /* Live Preview Box */
        .live-preview-box {
            background-color: var(--input-bg);
            border-radius: 10px;
            margin-top: 20px;
            padding: 15px;
            height: 250px;
            overflow-y: auto;
            border: none;
            font-size: 13px;
            line-height: 1.6;
            color: #cbd5e1;
            scroll-behavior: smooth;
        }

        .live-preview-box::-webkit-scrollbar {
            width: 6px;
        }
        .live-preview-box::-webkit-scrollbar-track {
            background: var(--input-bg); 
        }
        .live-preview-box::-webkit-scrollbar-thumb {
            background: #334155; 
            border-radius: 10px;
        }
        
        .preview-block {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #1e293b;
        }
        .preview-block:last-child {
            border-bottom: none;
        }
        .preview-time {
            color: var(--accent-color);
            font-size: 12px;
            margin-bottom: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <i class="fa-solid fa-closed-captioning logo-icon"></i>
            <h2>AI Subtitle Translator</h2>
            <div class="creator-badge">By Tharuk Bandara Edirisuriya</div>
            <p class="subtitle">ස්වභාවිකව කතා කරන සිංහලට පරිවර්තනය කිරීම සඳහා</p>
        </div>

        <div class="form-group">
            <label>1. ඉංග්‍රීසි .srt ෆයිල් එක තෝරන්න</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-file-video"></i>
                <input type="file" id="srtFileInput" accept=".srt">
            </div>
        </div>

        <div class="form-group">
            <label>2. Gemini API Key එක ඇතුලත් කරන්න</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-key"></i>
                <input type="password" id="apiKeyInput" placeholder="ඔබගේ Gemini API Key එක මෙතන අලවන්න...">
            </div>
        </div>

        <div class="form-group">
            <label>3. වරකට යවන ප්‍රමාණය (Batch Size)</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-layer-group"></i>
                <select id="batchSizeInput">
                    <option value="40" selected>40 Subtitles per batch (සුමට ක්‍රියාකාරීත්වය සඳහා)</option>
                    <option value="60">60 Subtitles per batch</option>
                    <option value="80">80 Subtitles per batch</option>
                </select>
            </div>
        </div>

        <button id="translateBtn">
            <i class="fa-solid fa-language"></i> පරිවර්තනය අරඹන්න
        </button>
        
        <div class="processing-area" id="processingArea">
            <div class="progress-bar-bg">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="status-text" id="statusMessage">පරිවර්තනය ආරම්භ වෙමින්...</div>
            
            <div class="live-preview-box" id="livePreviewBox">
                <div style="text-align: center; color: #64748b; margin-top: 100px;">
                    <i class="fa-solid fa-clapperboard"></i> සජීවී පරිවර්තනය මෙහි දිස්වනු ඇත...
                </div>
            </div>
        </div>

        <button id="downloadBtn">
            <i class="fa-solid fa-download"></i> සිංහල Subtitle ෆයිල් එක Download කරන්න
        </button>
    </div>

    <script>
        let finalTranslatedContent = "";

        // තත්පර ගණනක් රැඳී සිටීම සඳහා (Delay Function)
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        document.getElementById('translateBtn').addEventListener('click', async function() {
            const fileInput = document.getElementById('srtFileInput');
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            const batchSize = parseInt(document.getElementById('batchSizeInput').value);
            
            const translateBtn = document.getElementById('translateBtn');
            const processingArea = document.getElementById('processingArea');
            const progressFill = document.getElementById('progressFill');
            const status = document.getElementById('statusMessage');
            const livePreviewBox = document.getElementById('livePreviewBox');
            const downloadBtn = document.getElementById('downloadBtn');

            if (fileInput.files.length === 0) {
                alert("කරුණාකර .srt ෆයිල් එකක් තෝරන්න!"); return;
            }
            if (apiKey === "") {
                alert("කරුණාකර API Key එක ඇතුලත් කරන්න!"); return;
            }

            // UI Reset
            translateBtn.disabled = true;
            translateBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> පරිවර්තනය වෙමින් පවතී...';
            downloadBtn.style.display = "none";
            processingArea.style.display = "block";
            progressFill.style.width = "0%";
            livePreviewBox.innerHTML = ''; 
            finalTranslatedContent = "";

            const file = fileInput.files[0];
            const text = await file.text();

            const blocks = text.trim().split(/\r?\n\r?\n/);
            const totalBlocks = blocks.length;
            
            const batches = [];
            for (let i = 0; i < totalBlocks; i += batchSize) {
                batches.push(blocks.slice(i, i + batchSize).join("\n\n"));
            }

            const totalBatches = batches.length;
            
            // Dynamic Model Fetching
            status.innerHTML = `<span style="color:var(--accent-color)"><i class="fa-solid fa-magnifying-glass"></i> AI මොඩලය සොයමින් පවතී...</span>`;
            let targetModelName = "models/gemini-1.5-flash"; 
            
            try {
                const modelsResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                const modelsData = await modelsResponse.json();
                if (modelsData.models) {
                    const validModels = modelsData.models.filter(m => 
                        m.supportedGenerationMethods && 
                        m.supportedGenerationMethods.includes("generateContent") &&
                        m.name.includes("gemini") && !m.name.includes("vision") && !m.name.includes("embedding")
                    );
                    if(validModels.length > 0) {
                        let selectedModel = validModels.find(m => m.name.includes("flash")) || validModels[0];
                        targetModelName = selectedModel.name;
                    }
                }
            } catch (e) {
                console.log("Model fetch failed, using default.");
            }

            // ආරම්භ කිරීම
            for (let i = 0; i < totalBatches; i++) {
                let success = false;
                let retryCount = 0;
                const maxRetries = 20; // වතාවක් 20ක් දක්වා උත්සාහ කරයි

                const promptText = `You are a professional subtitle translator. Translate the following English SRT blocks into natural, everyday conversational Sinhala (කතා කරන සිංහල) used in Sri Lanka. 
                Strictly keep the exact SRT format (Sequence numbers and Timestamps MUST remain untouched). Do not add any extra explanations. Only output the translated SRT content.\n\n${batches[i]}`;

                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/${targetModelName}:generateContent?key=${apiKey}`;
                const requestBody = { contents: [{ parts: [{ text: promptText }] }] };

                // Auto-Retry Loop
                while (!success && retryCount < maxRetries) {
                    try {
                        status.innerHTML = `කාණ්ඩ <strong style="color:var(--accent-color)">${i + 1} / ${totalBatches}</strong> පරිවර්තනය වෙමින් පවතී...`;
                        
                        const response = await fetch(apiUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(requestBody)
                        });

                        // "High Demand" හෝ "Rate Limit" ආවොත්
                        if (response.status === 503 || response.status === 429) {
                            retryCount++;
                            status.innerHTML = `<span style="color:var(--warning-color)"><i class="fa-solid fa-rotate-right fa-spin"></i> සර්වර් කාර්යබහුලයි. නැවත උත්සාහ කරයි (උත්සාහය ${retryCount})...</span>`;
                            await sleep(5000); // තත්පර 5ක් ඉඳලා ආයෙත් ට්‍රයි කරනවා
                            continue;
                        }

                        const data = await response.json();

                        if (data.error) {
                            throw new Error(data.error.message);
                        }

                        let translatedText = data.candidates[0].content.parts[0].text;
                        translatedText = translatedText.replace(/```srt\n/g, '').replace(/```/g, '').trim();

                        finalTranslatedContent += translatedText + "\n\n";
                        
                        // Live Preview එකට දත්ත ඇතුලත් කිරීම
                        const translatedBlocks = translatedText.split(/\r?\n\r?\n/);
                        translatedBlocks.forEach(block => {
                            const lines = block.split('\n');
                            if (lines.length >= 3) {
                                const seq = lines[0];
                                const time = lines[1];
                                const textContent = lines.slice(2).join('<br>');
                                
                                const blockHTML = `
                                    <div class="preview-block">
                                        <div class="preview-time">${seq} | ${time}</div>
                                        <div>${textContent}</div>
                                    </div>
                                `;
                                livePreviewBox.insertAdjacentHTML('beforeend', blockHTML);
                            }
                        });
                        
                        // පෙට්ටිය පහළටම Scroll කිරීම
                        livePreviewBox.scrollTop = livePreviewBox.scrollHeight;

                        // ප්‍රතිශතය පෙන්වීම
                        const progressPercentage = Math.round(((i + 1) / totalBatches) * 100);
                        progressFill.style.width = progressPercentage + "%";

                        success = true; // සාර්ථකයි නම් ලූප් එකෙන් එළියට
                        await sleep(2000); // සාමාන්‍ය විරාමය

                    } catch (error) {
                        retryCount++;
                        status.innerHTML = `<span style="color:var(--warning-color)"><i class="fa-solid fa-rotate-right fa-spin"></i> දෝෂයක්. නැවත උත්සාහ කරයි (උත්සාහය ${retryCount})...</span>`;
                        await sleep(5000);
                        
                        if (retryCount >= maxRetries) {
                            status.innerHTML = `<span style="color:#ef4444"><i class="fa-solid fa-circle-exclamation"></i> දිගින් දිගටම දෝෂ මතු විය. කරුණාකර පසුව නැවත උත්සාහ කරන්න.</span>`;
                            translateBtn.disabled = false;
                            translateBtn.innerHTML = '<i class="fa-solid fa-language"></i> නැවත උත්සාහ කරන්න';
                            return;
                        }
                    }
                }
            }

            status.innerHTML = '<span style="color:var(--success-color)"><i class="fa-solid fa-circle-check"></i> පරිවර්තනය 100% ක් සාර්ථකයි!</span>';
            translateBtn.disabled = false;
            translateBtn.innerHTML = '<i class="fa-solid fa-language"></i> අලුත් ෆයිල් එකක් පරිවර්තනය කරන්න';
            downloadBtn.style.display = "flex";
        });

        document.getElementById('downloadBtn').addEventListener('click', function() {
            if (!finalTranslatedContent) return;
            const blob = new Blob([finalTranslatedContent.trim()], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = 'Sinhala_Spoken_Subtitles.srt';
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
